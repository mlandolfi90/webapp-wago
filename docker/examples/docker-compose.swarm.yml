version: '3.8'

services:
  webapp-wago:
    image: mlandolfi90/webapp-wago:latest
    networks:
      - network_public
    environment:
      # Servidor
      SERVER_PORT: 4000
      CLIENT_NAME: "webapp-wago"

      # Segurança (OBRIGATÓRIO)
      GLOBAL_API_KEY: "sua-chave-api-segura-aqui"

      # Banco de Dados PostgreSQL (RECOMENDADO)
      POSTGRES_AUTH_DB: "postgresql://postgres:senha@postgres:5432/webappwago_auth?sslmode=disable"
      POSTGRES_USERS_DB: "postgresql://postgres:senha@postgres:5432/webappwago_users?sslmode=disable"
      DATABASE_SAVE_MESSAGES: "false"

      # Logs e Debug
      WADEBUG: "INFO"
      LOGTYPE: "console"
      LOG_DIRECTORY: "/app/logs"
      LOG_MAX_SIZE: "100"
      LOG_MAX_BACKUPS: "5"
      LOG_MAX_AGE: "30"
      LOG_COMPRESS: "true"

      # Conexão
      CONNECT_ON_STARTUP: "true"
      WEBHOOK_FILES: "true"

      # Sistema
      OS_NAME: "Linux"

      # Conversor de Áudio (Opcional)
      API_AUDIO_CONVERTER: ""
      API_AUDIO_CONVERTER_KEY: ""

      # Proxy (Opcional)
      PROXY_HOST: ""
      PROXY_PORT: ""
      PROXY_USERNAME: ""
      PROXY_PASSWORD: ""

      # RabbitMQ (Opcional)
      AMQP_URL: ""
      AMQP_GLOBAL_ENABLED: "false"
      AMQP_GLOBAL_EVENTS: ""

      # NATS (Opcional)
      NATS_URL: ""
      NATS_GLOBAL_ENABLED: "false"

      # Eventos
      EVENT_IGNORE_GROUP: "false"
      EVENT_IGNORE_STATUS: "true"

      # MinIO/S3 (Opcional)
      MINIO_ENABLED: "false"
      MINIO_ENDPOINT: ""
      MINIO_ACCESS_KEY: ""
      MINIO_SECRET_KEY: ""
      MINIO_BUCKET: ""
      MINIO_USE_SSL: "false"

    volumes:
      - webappwago_data:/app/dbdata
      - webappwago_logs:/app/logs

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        # Traefik Labels (ajuste conforme necessário)
        - traefik.enable=true
        - traefik.http.routers.webappwago.rule=Host(`webapp-wago.seudominio.com`)
        - traefik.http.routers.webappwago.entrypoints=websecure
        - traefik.http.routers.webappwago.tls.certresolver=letsencryptresolver
        - traefik.http.routers.webappwago.service=webappwago
        - traefik.http.services.webappwago.loadbalancer.server.port=4000
        - traefik.http.services.webappwago.loadbalancer.passHostHeader=true

volumes:
  webappwago_data:
    external: true
    name: webappwago_data
  webappwago_logs:
    external: true
    name: webappwago_logs

networks:
  network_public:
    external: true
    name: network_public
